<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>NPM App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        :root { --forest: #1a2e05; --grass: #3e5622; --dirt: #c5a059; }
        body { background-color: #f8f8f8; font-family: -apple-system, system-ui, sans-serif; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        .form-group { @apply flex flex-col mb-5 w-full; }
        .input-label { @apply text-xs font-black uppercase text-stone-500 mb-2 tracking-wider block; }
        .input-field { @apply w-full p-4 rounded-xl border-2 border-stone-200 bg-white text-lg focus:border-[#3e5622] outline-none font-medium block; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top: 1px solid #e5e7eb; display: flex; justify-content: space-around; padding-top: 16px; padding-bottom: calc(16px + env(safe-area-inset-bottom)); z-index: 1000; box-shadow: 0 -10px 25px -5px rgba(0, 0, 0, 0.1); }
        .sun-card { @apply bg-white rounded-3xl shadow-sm border border-stone-200 p-5 mb-4 active:scale-[0.98] transition-all; }
        .btn-primary { @apply bg-[#1a2e05] text-white font-black py-5 px-6 rounded-2xl shadow-lg active:bg-black w-full text-xl text-center block mt-4 disabled:opacity-50; }
        .modal-overlay { @apply fixed inset-0 bg-black/60 backdrop-blur-sm z-[2000] flex items-end justify-center; }
        .modal-content { @apply bg-white w-full max-w-md rounded-t-[3rem] p-8 pb-24 animate-in slide-in-from-bottom duration-300 max-h-[92vh] overflow-y-auto shadow-2xl; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, onSnapshot, doc, updateDoc, deleteDoc, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAbPZO0PBMojki9axxrB5b30WqiVh4jgsE",
            authDomain: "npm-app-3dbc7.firebaseapp.com",
            projectId: "npm-app-3dbc7",
            storageBucket: "npm-app-3dbc7.firebasestorage.app",
            messagingSenderId: "714816852874",
            appId: "1:714816852874:web:e569408de4b487fd66ee73"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        // Ensure connection stays alive
        setPersistence(auth, browserLocalPersistence);

        window.NPM_FB = { auth, db, addDoc, collection, query, onSnapshot, doc, updateDoc, deleteDoc, signInWithEmailAndPassword, signOut, onAuthStateChanged, orderBy };
    </script>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const fb = window.NPM_FB;
        const SERVICES = ["Stump Grinding", "Land Clearing", "Auger Services", "Storm Cleanup", "Debris Hauling", "Free Estimate", "Other"];

        const App = () => {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('dashboard');
            const [customers, setCustomers] = useState([]);
            const [appointments, setAppointments] = useState([]);
            const [selectedJob, setSelectedJob] = useState(null);
            const [isAddingJob, setIsAddingJob] = useState(null);
            const [isAddingCustomerAndJob, setIsAddingCustomerAndJob] = useState(false);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const unsubAuth = fb.onAuthStateChanged(fb.auth, (u) => {
                    setUser(u);
                    setLoading(false);
                });
                return () => unsubAuth();
            }, []);

            useEffect(() => {
                if (user) {
                    const unsubCust = fb.onSnapshot(fb.query(fb.collection(fb.db, "customers"), fb.orderBy("name")), (s) => 
                        setCustomers(s.docs.map(d => ({id: d.id, ...d.data()})))
                    );
                    const unsubAppt = fb.onSnapshot(fb.query(fb.collection(fb.db, "appointments"), fb.orderBy("date")), (s) => 
                        setAppointments(s.docs.map(d => ({id: d.id, ...d.data()})))
                    );
                    return () => { unsubCust(); unsubAppt(); };
                }
            }, [user]);

            const handleExit = async () => {
                try {
                    await fb.signOut(fb.auth);
                    setUser(null);
                    setView('dashboard');
                } catch (err) {
                    alert("Logout failed: " + err.message);
                }
            };

            const changeTab = (v) => {
                setSelectedJob(null);
                setIsAddingCustomerAndJob(false);
                setIsAddingJob(null);
                setView(v);
            };

            if (loading) return <div className="p-10 text-center font-bold text-stone-400 mt-20 italic">Loading NPM...</div>;
            if (!user) return <LoginScreen onLogin={(u) => setUser(u)} />;

            return (
                <div className="max-w-md mx-auto min-h-screen pb-40">
                    <header className="p-6 pt-12 bg-[#1a2e05] text-white flex justify-between items-center rounded-b-[2.5rem] shadow-xl">
                        <div><h1 className="text-2xl font-black italic">NPM App</h1><p className="text-[10px] font-bold opacity-60 uppercase tracking-widest">Property Maintenance</p></div>
                        <button onClick={handleExit} className="bg-white/10 px-4 py-2 rounded-full text-[10px] font-black uppercase active:bg-white/20">Exit</button>
                    </header>

                    <main className="p-4">
                        {view === 'dashboard' && <Dashboard appointments={appointments} onJobClick={setSelectedJob} />}
                        {view === 'customers' && <CustomersList customers={customers} onAddJob={setIsAddingJob} onAddCustomer={() => setIsAddingCustomerAndJob(true)} />}
                        {view === 'appointments' && <AppointmentsList appointments={appointments} onJobClick={setSelectedJob} onAddBlankJob={() => setIsAddingCustomerAndJob(true)} />}
                        {view === 'reminders' && <RemindersView appointments={appointments} customers={customers} />}
                    </main>

                    <div className="bottom-nav">
                        <NavIcon active={view==='dashboard'} label="Home" icon="🏠" onClick={()=>changeTab('dashboard')} />
                        <NavIcon active={view==='appointments'} label="Schedule" icon="📅" onClick={()=>changeTab('appointments')} />
                        <NavIcon active={view==='customers'} label="Clients" icon="👥" onClick={()=>changeTab('customers')} />
                        <NavIcon active={view==='reminders'} label="Remind" icon="🔔" onClick={()=>changeTab('reminders')} />
                    </div>

                    {isAddingCustomerAndJob && <NewClientAndJobModal onClose={()=>setIsAddingCustomerAndJob(false)} />}
                    {isAddingJob && <ExistingClientJobModal customer={isAddingJob} onClose={()=>setIsAddingJob(null)} />}
                    {selectedJob && <JobDetailModal job={selectedJob} onClose={()=>setSelectedJob(null)} customers={customers} />}
                </div>
            );
        };

        const NavIcon = ({ active, label, icon, onClick }) => (
            <button onClick={onClick} className={`flex flex-col items-center transition-all ${active ? 'text-[#3e5622] scale-110 font-black' : 'text-stone-300'}`}>
                <span className="text-2xl mb-1">{icon}</span>
                <span className="text-[10px] uppercase font-bold tracking-tighter">{label}</span>
            </button>
        );

        const Dashboard = ({ appointments, onJobClick }) => {
            const todayStr = new Date().toISOString().split('T')[0];
            const tomorrowDate = new Date(); tomorrowDate.setDate(tomorrowDate.getDate() + 1);
            const tomorrowStr = tomorrowDate.toISOString().split('T')[0];

            const today = appointments.filter(a => a.date?.includes(todayStr) && a.status !== 'Completed');
            const tomorrow = appointments.filter(a => a.date?.includes(tomorrowStr) && a.status !== 'Completed');

            return (
                <div className="animate-in fade-in">
                    <h3 className="font-black text-[#1a2e05] mt-2 mb-4 px-2 uppercase text-xs italic tracking-widest">Today ({today.length})</h3>
                    {today.length === 0 ? <p className="px-2 text-stone-300 italic mb-8">No jobs today.</p> : today.map(j => <JobCard key={j.id} j={j} onClick={()=>onJobClick(j)} />)}
                    
                    <h3 className="font-black text-[#c5a059] mt-8 mb-4 px-2 uppercase text-xs italic tracking-widest">Tomorrow ({tomorrow.length})</h3>
                    {tomorrow.length === 0 ? <p className="px-2 text-stone-300 italic">Clear tomorrow.</p> : tomorrow.map(j => <JobCard key={j.id} j={j} onClick={()=>onJobClick(j)} />)}
                </div>
            );
        };

        const JobCard = ({ j, onClick }) => (
            <div onClick={onClick} className="sun-card border-l-8 border-[#c5a059] flex justify-between items-center">
                <div className="overflow-hidden"><div className="font-black text-lg text-[#1a2e05] truncate">{j.service}</div><div className="text-stone-500 font-bold text-sm truncate">{j.customerName}</div></div>
                <div className="font-black text-[#3e5622] ml-2">${j.price}</div>
            </div>
        );

        const LoginScreen = ({ onLogin }) => {
            const [email, setEmail] = useState('');
            const [pass, setPass] = useState('');
            const [loading, setLoading] = useState(false);

            const handleLogin = async () => {
                if(!email || !pass) return alert("Enter email and password.");
                setLoading(true);
                try {
                    const res = await fb.signInWithEmailAndPassword(fb.auth, email, pass);
                    onLogin(res.user);
                } catch (err) {
                    alert("Login Failed: Check email/password and internet connection.");
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="p-10 flex flex-col justify-center min-h-screen bg-white">
                    <div className="mb-12 text-center">
                        <h1 className="text-7xl font-black text-[#1a2e05] italic leading-none">NPM</h1>
                        <p className="font-bold text-stone-300 uppercase tracking-widest text-[10px] mt-4">Nance Property Maintenance</p>
                    </div>
                    <div className="form-group"><label className="input-label">Work Email</label><input className="input-field" type="email" onChange={e=>setEmail(e.target.value)} placeholder="name@email.com" /></div>
                    <div className="form-group"><label className="input-label">Password</label><input className="input-field" type="password" onChange={e=>setPass(e.target.value)} placeholder="••••••••" /></div>
                    <button onClick={handleLogin} disabled={loading} className="btn-primary">{loading ? "LOGGING IN..." : "LOG IN"}</button>
                </div>
            );
        };

        // ... Remaining Modal Components (CustomersList, AppointmentsList, etc.) go here ...
        // (Keeping the logic same as previous working version for those views)

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
