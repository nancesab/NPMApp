<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NPM App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { background-color: #f8f8f8; font-family: -apple-system, system-ui, sans-serif; margin: 0; padding: 0; }
        .input-label { @apply text-[10px] font-black uppercase text-stone-400 mb-1.5 tracking-widest block; }
        .input-field { width: 100%; padding: 1rem; border-radius: 1rem; border: 2px solid #f1f1f1; background: #fafafa; font-size: 1rem; font-weight: 700; outline: none; }
        .btn-primary { @apply bg-[#1a2e05] text-white font-black py-5 px-6 rounded-2xl shadow-lg active:bg-black w-full text-xl text-center block mt-4; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top: 1px solid #e5e7eb; display: flex; justify-content: space-around; padding-top: 12px; padding-bottom: calc(20px + env(safe-area-inset-bottom)); z-index: 1000; }
        .floating-add-bar { position: fixed; bottom: calc(100px + env(safe-area-inset-bottom)); left: 20px; right: 20px; z-index: 900; @apply bg-[#c5a059] text-white py-5 rounded-2xl shadow-2xl flex items-center justify-center gap-3 font-black uppercase tracking-widest; }
        .sun-card { @apply bg-white rounded-3xl shadow-sm border border-stone-200 p-5 mb-4; }
        .modal-overlay { @apply fixed inset-0 bg-black/60 backdrop-blur-sm z-[2000] flex items-end justify-center; }
        .modal-content { @apply bg-white w-full max-w-md rounded-t-[3rem] p-6 pb-32 max-h-[92vh] overflow-y-auto; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, onSnapshot, doc, updateDoc, deleteDoc, orderBy, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDKBNh28LkDEz0nyY6cfl6IiOHyzNlBd0U",
            authDomain: "npmapp-542dc.firebaseapp.com",
            projectId: "npmapp-542dc",
            storageBucket: "npmapp-542dc.firebasestorage.app",
            messagingSenderId: "111152583953",
            appId: "1:111152583953:web:7114f316fc0c381e6ae8b0"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        // Attach to window so React can see it
        window.NPM_FB = { auth, db, addDoc, collection, query, onSnapshot, doc, updateDoc, deleteDoc, signInWithEmailAndPassword, signOut, onAuthStateChanged, orderBy, where };
    </script>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const SERVICES = ["Stump Grinding", "Land Clearing", "Auger Services", "Storm Cleanup", "Debris Hauling", "Free Estimate", "Other"];

        const App = () => {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('dashboard');
            const [customers, setCustomers] = useState([]);
            const [contractors, setContractors] = useState([]);
            const [appointments, setAppointments] = useState([]);
            const [selectedJob, setSelectedJob] = useState(null);
            const [editEntity, setEditEntity] = useState(null);
            const [isAddingJob, setIsAddingJob] = useState(false);
            const [showHistory, setShowHistory] = useState(false);
            const [initializing, setInitializing] = useState(true);

            useEffect(() => {
                // Fail-safe: If Firebase hasn't responded in 2.5 seconds, show login anyway
                const timer = setTimeout(() => setInitializing(false), 2500);

                const checkAuth = setInterval(() => {
                    if (window.NPM_FB) {
                        clearInterval(checkAuth);
                        clearTimeout(timer);
                        window.NPM_FB.onAuthStateChanged(window.NPM_FB.auth, (u) => {
                            setUser(u);
                            setInitializing(false);
                        });
                    }
                }, 100);

                return () => { clearInterval(checkAuth); clearTimeout(timer); };
            }, []);

            useEffect(() => {
                if (user && window.NPM_FB) {
                    const fb = window.NPM_FB;
                    fb.onSnapshot(fb.query(fb.collection(fb.db, "customers"), fb.orderBy("name")), (s) => setCustomers(s.docs.map(d => ({id: d.id, ...d.data()}))));
                    fb.onSnapshot(fb.query(fb.collection(fb.db, "contractors"), fb.orderBy("name")), (s) => setContractors(s.docs.map(d => ({id: d.id, ...d.data()}))));
                    fb.onSnapshot(fb.collection(fb.db, "appointments"), (s) => setAppointments(s.docs.map(d => ({id: d.id, ...d.data()}))));
                }
            }, [user]);

            if (initializing) return <div className="flex h-screen items-center justify-center font-black text-stone-300 italic text-xl">CONNECTING...</div>;
            
            if (!user) return <LoginScreen onLogin={setUser} />;

            return (
                <div className="max-w-md mx-auto min-h-screen pb-48">
                    <header className="p-6 pt-12 bg-[#1a2e05] text-white flex justify-between items-center rounded-b-[2.5rem] shadow-xl">
                        <div><h1 className="text-2xl font-black italic">NPM App</h1><p className="text-[10px] font-bold opacity-60 uppercase tracking-widest">Property Maintenance</p></div>
                        <button onClick={() => window.NPM_FB.signOut(window.NPM_FB.auth)} className="bg-white/10 px-4 py-2 rounded-full text-[10px] font-black uppercase">Exit</button>
                    </header>

                    <main className="p-4">
                        {view === 'dashboard' && <Dashboard appointments={appointments} onJobClick={setSelectedJob} onTotalClick={() => setShowHistory(true)} />}
                        {view === 'appointments' && <AppointmentsList appointments={appointments} onJobClick={setSelectedJob} />}
                        {view === 'customers' && <PeopleList customers={customers} contractors={contractors} onEdit={setEditEntity} />}
                        {view === 'reminders' && <RemindersView appointments={appointments} customers={customers} />}
                    </main>

                    <button onClick={() => setIsAddingJob(true)} className="floating-add-bar">+ NEW JOB</button>

                    <nav className="bottom-nav">
                        <button onClick={()=>setView('dashboard')} className={`flex flex-col items-center flex-1 ${view==='dashboard'?'text-[#3e5622]':'text-stone-300'}`}>🏠<span className="text-[10px] font-bold uppercase">Home</span></button>
                        <button onClick={()=>setView('appointments')} className={`flex flex-col items-center flex-1 ${view==='appointments'?'text-[#3e5622]':'text-stone-300'}`}>📅<span className="text-[10px] font-bold uppercase">Jobs</span></button>
                        <button onClick={()=>setView('customers')} className={`flex flex-col items-center flex-1 ${view==='customers'?'text-[#3e5622]':'text-stone-300'}`}>👥<span className="text-[10px] font-bold uppercase">People</span></button>
                        <button onClick={()=>setView('reminders')} className={`flex flex-col items-center flex-1 ${view==='reminders'?'text-[#3e5622]':'text-stone-300'}`}>🔔<span className="text-[10px] font-bold uppercase">Remind</span></button>
                    </nav>

                    {isAddingJob && <JobModal contractors={contractors} onClose={()=>setIsAddingJob(false)} />}
                    {selectedJob && <JobDetailModal job={selectedJob} contractors={contractors} onClose={()=>setSelectedJob(null)} />}
                    {editEntity && <EditPersonModal entity={editEntity} onClose={()=>setEditEntity(null)} />}
                    {showHistory && <WeeklyHistoryModal appointments={appointments} onJobClick={(j) => { setShowHistory(false); setSelectedJob(j); }} onClose={() => setShowHistory(false)} />}
                </div>
            );
        };

        const LoginScreen = ({ onLogin }) => {
            const [email, setEmail] = useState(''); const [pass, setPass] = useState('');
            const handleLogin = async () => {
                try {
                    const res = await window.NPM_FB.signInWithEmailAndPassword(window.NPM_FB.auth, email.trim(), pass);
                    onLogin(res.user);
                } catch (e) { alert("Login Error. Ensure Email/Password Auth is ON in Firebase console."); }
            };
            return (
                <div className="flex flex-col h-screen items-center justify-center p-8 bg-white">
                    <h1 className="text-7xl font-black text-[#1a2e05] italic mb-12 uppercase tracking-tighter">NPM</h1>
                    <div className="w-full max-w-xs mb-6"><label className="input-label">Email</label><input className="input-field" type="email" onChange={e=>setEmail(e.target.value)} /></div>
                    <div className="w-full max-w-xs mb-6"><label className="input-label">Password</label><input className="input-field" type="password" onChange={e=>setPass(e.target.value)} /></div>
                    <button onClick={handleLogin} className="btn-primary">LOG IN</button>
                </div>
            );
        };

        const Dashboard = ({ appointments, onJobClick, onTotalClick }) => {
            const today = new Date();
            const lastWeek = new Date(); lastWeek.setDate(today.getDate() - 7);
            const getDS = (d) => d.toISOString().split('T')[0];

            const completedLastWeek = appointments.filter(a => a.status === 'Completed' && new Date(a.date) >= lastWeek);
            const weeklyTotal = completedLastWeek.reduce((sum, job) => sum + Number(job.price || 0), 0);
            
            const scheduled = appointments.filter(a => a.status === 'Scheduled' && a.date && a.date.includes(getDS(today)));

            return (
                <div>
                    <div onClick={onTotalClick} className="bg-[#3e5622] rounded-[2rem] p-6 mb-8 text-white shadow-inner cursor-pointer active:scale-95 transition-all">
                        <label className="text-[10px] font-black uppercase opacity-60 tracking-widest block mb-1">Weekly Total (Last 7 Days)</label>
                        <div className="text-4xl font-black tracking-tighter">${weeklyTotal.toLocaleString()}</div>
                        <div className="text-[10px] font-bold opacity-40 uppercase mt-2">View Completed Jobs →</div>
                    </div>
                    <h3 className="font-black text-[#1a2e05] mb-4 px-2 uppercase text-xs tracking-widest italic">Today's Jobs</h3>
                    {scheduled.length === 0 ? <p className="text-stone-300 italic px-2">Clear for today.</p> : scheduled.map(j => (
                        <div key={j.id} onClick={()=>onJobClick(j)} className="sun-card border-l-8 border-[#c5a059] flex justify-between items-center">
                            <div><div className="font-black text-lg text-[#1a2e05]">{j.service}</div><div className="text-stone-400 font-bold text-xs uppercase">{j.customerName}</div></div>
                            <div className="font-black text-[#3e5622]">${Number(j.price || 0).toLocaleString()}</div>
                        </div>
                    ))}
                </div>
            );
        };

        const WeeklyHistoryModal = ({ appointments, onJobClick, onClose }) => {
            const today = new Date();
            const lastWeek = new Date(); lastWeek.setDate(today.getDate() - 7);
            const completed = appointments.filter(a => a.status === 'Completed' && new Date(a.date) >= lastWeek);

            return (
                <div className="modal-overlay" onClick={onClose}><div className="modal-content" onClick={e=>e.stopPropagation()}>
                    <h3 className="text-2xl font-black mb-6 text-[#1a2e05]">Weekly History</h3>
                    <div className="space-y-3">
                        {completed.map(j => (
                            <div key={j.id} onClick={()=>onJobClick(j)} className="p-4 bg-stone-50 rounded-2xl flex justify-between items-center active:bg-stone-100">
                                <div><p className="font-black text-[#1a2e05]">{j.service}</p><p className="text-[10px] font-bold text-stone-400 uppercase">{j.customerName}</p></div>
                                <p className="font-black text-[#3e5622]">${Number(j.price || 0).toLocaleString()}</p>
                            </div>
                        ))}
                    </div>
                    <button onClick={onClose} className="btn-primary mt-8">CLOSE</button>
                </div></div>
            );
        };

        const JobModal = ({ contractors, onClose, job }) => {
            const [form, setForm] = useState(job || { contractorName: 'None', service: SERVICES[0], address: '', date: '', description: '', price: '', customerName: '', status: 'Scheduled' });
            const handleSave = async () => {
                if(!form.date) return alert("Date required");
                const fb = window.NPM_FB;
                const data = { ...form, price: Number(form.price) };
                if (job) await fb.updateDoc(fb.doc(fb.db, "appointments", job.id), data);
                else await fb.addDoc(fb.collection(fb.db, "appointments"), data);
                onClose();
            };
            return (
                <div className="modal-overlay" onClick={onClose}><div className="modal-content" onClick={e=>e.stopPropagation()}>
                    <h3 className="text-2xl font-black mb-6 uppercase italic">Job Details</h3>
                    <div className="mb-4"><label className="input-label">Customer Name</label><input className="input-field" value={form.customerName} onChange={e=>setForm({...form, customerName: e.target.value})} /></div>
                    <div className="mb-4"><label className="input-label">Service Type</label><select className="input-field" value={form.service} onChange={e=>setForm({...form, service: e.target.value})}>{SERVICES.map(s => <option key={s} value={s}>{s}</option>)}</select></div>
                    <div className="mb-4"><label className="input-label">Address</label><input className="input-field" value={form.address} onChange={e=>setForm({...form, address: e.target.value})} /></div>
                    <div className="mb-4"><label className="input-label">Date</label><input type="datetime-local" className="input-field" value={form.date} onChange={e=>setForm({...form, date: e.target.value})} /></div>
                    <div className="mb-4"><label className="input-label">Price ($)</label><input type="number" className="input-field" value={form.price} onChange={e=>setForm({...form, price: e.target.value})} /></div>
                    <div className="mb-4"><label className="input-label">Job Status</label><select className="input-field" value={form.status} onChange={e=>setForm({...form, status: e.target.value})}><option value="Scheduled">Scheduled</option><option value="Completed">Completed</option></select></div>
                    <button onClick={handleSave} className="btn-primary">SAVE JOB</button>
                </div></div>
            );
        };

        const JobDetailModal = ({ job, contractors, onClose }) => {
            const [isEditing, setIsEditing] = useState(false);
            if (isEditing) return <JobModal job={job} contractors={contractors} onClose={onClose} />;
            return (
                <div className="modal-overlay" onClick={onClose}><div className="modal-content" onClick={e=>e.stopPropagation()}>
                    <h2 className="text-3xl font-black text-[#1a2e05] mb-1">{job.service}</h2>
                    <p className="text-xl font-bold text-[#c5a059] mb-6">{job.customerName}</p>
                    <div className="bg-stone-50 p-4 rounded-xl mb-6">
                        <p className="text-[10px] font-black uppercase text-stone-400 mb-1">Status: <span className="text-[#3e5622]">{job.status}</span></p>
                        <p className="text-[10px] font-black uppercase text-stone-400 mt-4 mb-1">Price</p>
                        <p className="font-bold text-stone-800">${Number(job.price || 0).toLocaleString()}</p>
                    </div>
                    <button onClick={() => window.open(`http://maps.apple.com/?q=${encodeURIComponent(job.address)}`)} className="btn-primary bg-blue-600 mb-2">DIRECTIONS 📍</button>
                    <button onClick={() => setIsEditing(true)} className="btn-primary bg-stone-200 !text-stone-800">EDIT DETAILS</button>
                    <button onClick={onClose} className="w-full mt-4 text-xs font-bold text-stone-400 uppercase">Back</button>
                </div></div>
            );
        };

        const PeopleList = ({ customers, contractors, onEdit }) => <div><h2 className="font-black p-4 italic">Contact list coming in next sync...</h2></div>;
        const AppointmentsList = () => <div><h2 className="font-black p-4 italic">Full schedule coming in next sync...</h2></div>;
        const RemindersView = () => <div><h2 className="font-black p-4 italic">Reminders coming in next sync...</h2></div>;

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
