<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>NPM App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        :root { --forest: #1a2e05; --grass: #3e5622; --dirt: #c5a059; }
        body { background-color: #f8f8f8; font-family: -apple-system, system-ui, sans-serif; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        .input-label { @apply text-[10px] font-black uppercase text-stone-400 mb-1.5 tracking-widest block; }
        .input-field { width: 100%; padding: 1rem; border-radius: 1rem; border: 2px solid #f1f1f1; background: #fafafa; font-size: 1rem; font-weight: 700; outline: none; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top: 1px solid #e5e7eb; display: flex; justify-content: space-around; padding-top: 12px; padding-bottom: calc(20px + env(safe-area-inset-bottom)); z-index: 1000; }
        .floating-add-bar { position: fixed; bottom: calc(100px + env(safe-area-inset-bottom)); left: 20px; right: 20px; z-index: 900; @apply bg-[#c5a059] text-white py-5 rounded-2xl shadow-2xl flex items-center justify-center gap-3 active:scale-95 transition-transform font-black uppercase tracking-widest; }
        .sun-card { @apply bg-white rounded-3xl shadow-sm border border-stone-200 p-5 mb-4 active:scale-[0.98] transition-all cursor-pointer; }
        .btn-primary { @apply bg-[#1a2e05] text-white font-black py-5 px-6 rounded-2xl shadow-lg active:bg-black w-full text-xl text-center block mt-4 disabled:opacity-50; }
        .modal-overlay { @apply fixed inset-0 bg-black/60 backdrop-blur-sm z-[2000] flex items-end justify-center; }
        .modal-content { @apply bg-white w-full max-w-md rounded-t-[3rem] p-6 pb-32 animate-in slide-in-from-bottom duration-300 max-h-[92vh] overflow-y-auto shadow-2xl; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, onSnapshot, doc, updateDoc, deleteDoc, orderBy, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDKBNh28LkDEz0nyY6cfl6IiOHyzNlBd0U",
            authDomain: "npmapp-542dc.firebaseapp.com",
            projectId: "npmapp-542dc",
            storageBucket: "npmapp-542dc.firebasestorage.app",
            messagingSenderId: "111152583953",
            appId: "1:111152583953:web:7114f316fc0c381e6ae8b0"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        setPersistence(auth, browserLocalPersistence);
        window.NPM_FB = { auth, db, addDoc, collection, query, onSnapshot, doc, updateDoc, deleteDoc, signInWithEmailAndPassword, signOut, onAuthStateChanged, orderBy, where };
    </script>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const fb = window.NPM_FB;
        const SERVICES = ["Stump Grinding", "Land Clearing", "Auger Services", "Storm Cleanup", "Debris Hauling", "Free Estimate", "Other"];

        const App = () => {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('dashboard');
            const [customers, setCustomers] = useState([]);
            const [contractors, setContractors] = useState([]);
            const [appointments, setAppointments] = useState([]);
            const [selectedJob, setSelectedJob] = useState(null);
            const [isAddingJob, setIsAddingJob] = useState(false);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const unsubAuth = fb.onAuthStateChanged(fb.auth, (u) => { setUser(u); setLoading(false); });
                return () => unsubAuth();
            }, []);

            useEffect(() => {
                if (user) {
                    fb.onSnapshot(fb.query(fb.collection(fb.db, "customers"), fb.orderBy("name")), (s) => setCustomers(s.docs.map(d => ({id: d.id, ...d.data()}))));
                    fb.onSnapshot(fb.query(fb.collection(fb.db, "contractors"), fb.orderBy("name")), (s) => setContractors(s.docs.map(d => ({id: d.id, ...d.data()}))));
                    fb.onSnapshot(fb.query(fb.collection(fb.db, "appointments"), fb.where("status", "==", "Scheduled")), (s) => setAppointments(s.docs.map(d => ({id: d.id, ...d.data()}))));
                }
            }, [user]);

            if (loading) return <div className="flex h-screen items-center justify-center font-black text-stone-300 italic text-xl">NPM...</div>;
            if (!user) return <LoginScreen onLogin={setUser} />;

            return (
                <div className="max-w-md mx-auto min-h-screen pb-48">
                    <header className="p-6 pt-12 bg-[#1a2e05] text-white flex justify-between items-center rounded-b-[2.5rem] shadow-xl">
                        <div><h1 className="text-2xl font-black italic">NPM App</h1><p className="text-[10px] font-bold opacity-60 uppercase tracking-widest">Nance Property Maintenance</p></div>
                        <button onClick={() => fb.signOut(fb.auth)} className="bg-white/10 px-4 py-2 rounded-full text-[10px] font-black uppercase">Exit</button>
                    </header>

                    <main className="p-4">
                        {view === 'dashboard' && <Dashboard appointments={appointments} onJobClick={setSelectedJob} />}
                        {view === 'appointments' && <AppointmentsList appointments={appointments} onJobClick={setSelectedJob} />}
                        {view === 'customers' && <PeopleList customers={customers} contractors={contractors} />}
                        {view === 'reminders' && <RemindersView appointments={appointments} customers={customers} />}
                    </main>

                    <button onClick={() => setIsAddingJob(true)} className="floating-add-bar">+ NEW JOB</button>

                    <div className="bottom-nav">
                        <NavIcon active={view==='dashboard'} label="Home" icon="🏠" onClick={()=>setView('dashboard')} />
                        <NavIcon active={view==='appointments'} label="Schedule" icon="📅" onClick={()=>setView('appointments')} />
                        <NavIcon active={view==='customers'} label="People" icon="👥" onClick={()=>setView('customers')} />
                        <NavIcon active={view==='reminders'} label="Remind" icon="🔔" onClick={()=>setView('reminders')} />
                    </div>

                    {isAddingJob && <NewJobModal contractors={contractors} onClose={()=>setIsAddingJob(false)} />}
                    {selectedJob && <JobDetailModal job={selectedJob} onClose={()=>setSelectedJob(null)} />}
                </div>
            );
        };

        const LoginScreen = ({ onLogin }) => {
            const [email, setEmail] = useState(''); const [pass, setPass] = useState('');
            const handleLogin = async () => {
                try {
                    const res = await fb.signInWithEmailAndPassword(fb.auth, email.trim().toLowerCase(), pass);
                    onLogin(res.user);
                } catch (e) { alert("Login Failed."); }
            };
            return (
                <div className="flex flex-col h-screen items-center justify-center p-8 bg-white">
                    <h1 className="text-7xl font-black text-[#1a2e05] italic mb-12">NPM</h1>
                    <div className="w-full max-w-xs mb-6"><label className="input-label">Email</label><input className="input-field" type="email" onChange={e=>setEmail(e.target.value)} /></div>
                    <div className="w-full max-w-xs mb-6"><label className="input-label">Password</label><input className="input-field" type="password" onChange={e=>setPass(e.target.value)} /></div>
                    <button onClick={handleLogin} className="btn-primary">Log In</button>
                </div>
            );
        };

        const NavIcon = ({ active, label, icon, onClick }) => (
            <button onClick={onClick} className={`flex flex-col items-center flex-1 transition-all ${active ? 'text-[#3e5622] font-black' : 'text-stone-300'}`}>
                <span className="text-2xl mb-1">{icon}</span>
                <span className="text-[10px] uppercase font-bold tracking-tighter">{label}</span>
            </button>
        );

        const Dashboard = ({ appointments, onJobClick }) => {
            const today = new Date();
            const tomorrow = new Date();
            tomorrow.setDate(today.getDate() + 1);

            // Simple YYYY-MM-DD match
            const getDS = (d) => {
                const year = d.getFullYear();
                const month = String(d.getMonth() + 1).padStart(2, '0');
                const day = String(d.getDate()).padStart(2, '0');
                return `${year}-${month}-${day}`;
            };
            
            const tStr = getDS(today);
            const mStr = getDS(tomorrow);

            const todayJobs = appointments.filter(a => a.date && a.date.includes(tStr));
            const tomorrowJobs = appointments.filter(a => a.date && a.date.includes(mStr));

            return (
                <div className="animate-in fade-in">
                    <h3 className="font-black text-[#1a2e05] mt-2 mb-4 px-2 uppercase text-xs tracking-widest italic">Today's Jobs</h3>
                    {todayJobs.length === 0 ? <p className="px-2 mb-8 text-stone-300 italic text-sm">Nothing for today ({tStr})</p> : todayJobs.map(j => <JobCard key={j.id} j={j} onClick={()=>onJobClick(j)} />)}
                    
                    <h3 className="font-black text-[#1a2e05] mt-8 mb-4 px-2 uppercase text-xs tracking-widest italic">Tomorrow's Jobs</h3>
                    {tomorrowJobs.length === 0 ? <p className="px-2 text-stone-300 italic text-sm">Nothing for tomorrow ({mStr})</p> : tomorrowJobs.map(j => <JobCard key={j.id} j={j} onClick={()=>onJobClick(j)} />)}
                </div>
            );
        };

        const JobCard = ({ j, onClick }) => (
            <div onClick={onClick} className="sun-card border-l-8 border-[#c5a059] flex justify-between items-center">
                <div className="overflow-hidden">
                    <div className="font-black text-lg text-[#1a2e05] truncate">{j.service}</div>
                    <div className="text-stone-500 font-bold text-sm truncate">{j.customerName || 'Unassigned'}</div>
                </div>
                <div className="font-black text-[#3e5622] ml-2 font-mono">${j.price || 0}</div>
            </div>
        );

        const AppointmentsList = ({ appointments, onJobClick }) => (
            <div className="animate-in fade-in">
                <h3 className="font-black text-[#1a2e05] uppercase text-xs tracking-widest mb-6 px-2 italic">Full Schedule</h3>
                {appointments.length === 0 ? <p className="px-2 text-stone-300 italic">No scheduled jobs.</p> : appointments.map(j => <JobCard key={j.id} j={j} onClick={() => onJobClick(j)} />)}
            </div>
        );

        const PeopleList = ({ customers, contractors }) => {
            const [tab, setTab] = useState('clients');
            const [name, setName] = useState(''); const [phone, setPhone] = useState('');
            const addPerson = async () => {
                if(!name) return;
                await fb.addDoc(fb.collection(fb.db, tab === 'clients' ? "customers" : "contractors"), { name, phone });
                setName(''); setPhone('');
            };
            return (
                <div className="animate-in fade-in">
                    <div className="flex bg-stone-100 p-1 rounded-2xl mb-6">
                        <button onClick={()=>setTab('clients')} className={`flex-1 py-3 rounded-xl font-black text-xs uppercase ${tab==='clients' ? 'bg-white shadow-sm text-[#1a2e05]' : 'text-stone-400'}`}>Clients</button>
                        <button onClick={()=>setTab('contractors')} className={`flex-1 py-3 rounded-xl font-black text-xs uppercase ${tab==='contractors' ? 'bg-white shadow-sm text-[#1a2e05]' : 'text-stone-400'}`}>Contractors</button>
                    </div>
                    <div className="sun-card bg-stone-50 border-dashed border-2">
                        <input className="input-field mb-2" placeholder="Full Name" value={name} onChange={e=>setName(e.target.value)} />
                        <input className="input-field mb-2" placeholder="Phone" value={phone} onChange={e=>setPhone(e.target.value)} />
                        <button onClick={addPerson} className="w-full py-3 bg-[#3e5622] text-white font-black rounded-xl text-xs uppercase">Add {tab === 'clients' ? 'Client' : 'Contractor'}</button>
                    </div>
                    {(tab === 'clients' ? customers : contractors).map(p => (
                        <div key={p.id} className="sun-card flex justify-between items-center">
                            <div><h4 className="font-black text-lg text-[#1a2e05]">{p.name}</h4><p className="text-[#c5a059] font-bold text-xs">{p.phone}</p></div>
                            <button onClick={async() => {if(confirm("Delete?")) await fb.deleteDoc(fb.doc(fb.db, tab === 'clients' ? "customers" : "contractors", p.id))}} className="text-red-300">🗑️</button>
                        </div>
                    ))}
                </div>
            );
        };

        const RemindersView = ({ appointments, customers }) => {
            const pending = appointments.filter(a => !a.reminderSent);
            const sendSMS = (appt) => {
                const cust = customers.find(c => c.name === appt.customerName);
                const msg = `Hi ${appt.customerName}! Reminder from NPM for your ${appt.service} on ${new Date(appt.date).toLocaleDateString()}.`;
                window.open(`sms:${cust?.phone || ''}?&body=${encodeURIComponent(msg)}`);
                fb.updateDoc(fb.doc(fb.db, "appointments", appt.id), { reminderSent: true });
            };
            return (
                <div className="animate-in fade-in">
                    <h3 className="font-black text-[#1a2e05] mb-6 px-2 uppercase text-xs tracking-widest italic">Pending Reminders</h3>
                    {pending.length === 0 ? <p className="px-2 text-stone-300 italic">No pending reminders.</p> : pending.map(a => (
                        <div key={a.id} className="sun-card border-l-8 border-[#3e5622]">
                            <div className="font-black text-[#1a2e05] text-lg">{a.customerName || 'Unassigned'}</div>
                            <p className="text-xs font-bold text-stone-400 mb-6 uppercase tracking-widest">{a.service}</p>
                            <button onClick={() => sendSMS(a)} className="btn-primary py-4 text-sm uppercase">Send Text</button>
                        </div>
                    ))}
                </div>
            );
        };

        const NewJobModal = ({ contractors, onClose }) => {
            const [form, setForm] = useState({ contractorName: contractors[0]?.name || '', service: SERVICES[0], address: '', date: '', description: '', price: '', customerName: '' });
            const handleSave = async () => {
                if(!form.date) return alert("Date is required.");
                try {
                    await fb.addDoc(fb.collection(fb.db, "appointments"), { ...form, status: 'Scheduled', reminderSent: false });
                    onClose();
                } catch (e) { alert("Error: " + e.message); }
            };
            return (
                <div className="modal-overlay" onClick={onClose}><div className="modal-content" onClick={e=>e.stopPropagation()}><div className="w-12 h-1.5 bg-stone-200 rounded-full mx-auto mb-6"></div>
                    <h3 className="text-2xl font-black mb-6 text-[#1a2e05]">New Job</h3>
                    <div className="mb-4"><label className="input-label">Contractor</label><select className="input-field" onChange={e=>setForm({...form, contractorName: e.target.value})} value={form.contractorName}>{contractors.map(c => <option key={c.id} value={c.name}>{c.name}</option>)}</select></div>
                    <div className="mb-4"><label className="input-label">Service</label><select className="input-field" onChange={e=>setForm({...form, service: e.target.value})}>{SERVICES.map(sv => <option key={sv} value={sv}>{sv}</option>)}</select></div>
                    <div className="mb-4"><label className="input-label">Address</label><input className="input-field" onChange={e=>setForm({...form, address: e.target.value})} /></div>
                    <div className="mb-4"><label className="input-label">Date/Time</label><input type="datetime-local" className="input-field" onChange={e=>setForm({...form, date: e.target.value})} /></div>
                    <div className="mb-4"><label className="input-label">Description</label><textarea className="input-field h-24" onChange={e=>setForm({...form, description: e.target.value})} /></div>
                    <div className="mb-4"><label className="input-label">Estimate ($)</label><input type="number" className="input-field" onChange={e=>setForm({...form, price: e.target.value})} /></div>
                    <div className="mb-4"><label className="input-label">Customer Name</label><input className="input-field" onChange={e=>setForm({...form, customerName: e.target.value})} /></div>
                    <button onClick={handleSave} className="btn-primary">SAVE JOB</button>
                </div></div>
            );
        };

        const JobDetailModal = ({ job, onClose }) => {
            const markDone = async () => { await fb.updateDoc(fb.doc(fb.db, "appointments", job.id), { status: 'Completed' }); onClose(); };
            const deleteJob = async () => { if(confirm("Delete this record?")) { await fb.deleteDoc(fb.doc(fb.db, "appointments", job.id)); onClose(); } };
            return (
                <div className="modal-overlay" onClick={onClose}><div className="modal-content" onClick={e=>e.stopPropagation()}><div className="w-12 h-1.5 bg-stone-200 rounded-full mx-auto mb-8"></div>
                    <h2 className="text-3xl font-black text-[#1a2e05] mb-1">{job.service}</h2>
                    <p className="text-xl font-bold text-[#c5a059] mb-6">{job.customerName || 'Unassigned'}</p>
                    <div className="bg-stone-50 p-4 rounded-xl mb-6 border border-stone-100">
                        <p className="text-[10px] font-black uppercase text-stone-400 mb-1">Contractor</p>
                        <p className="font-bold text-[#3e5622]">{job.contractorName || 'None'}</p>
                        <p className="text-[10px] font-black uppercase text-stone-400 mt-4 mb-1">Description</p>
                        <p className="text-sm text-stone-600 leading-relaxed">{job.description || "None"}</p>
                    </div>
                    <button onClick={() => window.open(`http://maps.apple.com/?q=${encodeURIComponent(job.address)}`)} className="w-full text-left bg-blue-50 p-5 rounded-2xl text-blue-700 font-bold border border-blue-100 flex items-center justify-between mb-4">Open Maps 📍</button>
                    <button onClick={markDone} className="btn-primary mb-3">✅ MARK AS DONE</button>
                    <button onClick={deleteJob} className="w-full py-2 text-red-300 font-bold text-[10px] uppercase tracking-widest text-center">Delete Record</button>
                </div></div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
