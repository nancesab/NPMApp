<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>NPM Mobile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { background-color: #f8f8f8; font-family: -apple-system, system-ui, sans-serif; }
        .btn-primary { @apply bg-[#1a2e05] text-white font-black py-4 px-6 rounded-2xl w-full shadow-lg; }
        .input-field { @apply w-full p-4 rounded-xl border-2 border-stone-200 bg-white text-lg mb-3 outline-none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, onSnapshot, doc, updateDoc, deleteDoc, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAbPZO0PBMojki9axxrB5b30WqiVh4jgsE",
            authDomain: "npm-app-3dbc7.firebaseapp.com",
            projectId: "npm-app-3dbc7",
            storageBucket: "npm-app-3dbc7.firebasestorage.app",
            messagingSenderId: "714816852874",
            appId: "1:714816852874:web:e569408de4b487fd66ee73"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        setPersistence(auth, browserLocalPersistence);

        // Export to window so Babel/React can see it
        window.NPM_FB = { auth, db, collection, addDoc, query, onSnapshot, doc, updateDoc, deleteDoc, signInWithEmailAndPassword, onAuthStateChanged, orderBy };
    </script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [user, setUser] = useState(null);
            const [email, setEmail] = useState('');
            const [pass, setPass] = useState('');
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                // Wait for Firebase to check if user is already logged in
                const timer = setTimeout(() => {
                    if (window.NPM_FB) {
                        window.NPM_FB.onAuthStateChanged(window.NPM_FB.auth, (u) => {
                            setUser(u);
                            setLoading(false);
                        });
                    }
                }, 1000); 
                return () => clearTimeout(timer);
            }, []);

            const login = async () => {
                try {
                    await window.NPM_FB.signInWithEmailAndPassword(window.NPM_FB.auth, email, pass);
                } catch (e) {
                    alert("Login failed: " + e.message);
                }
            };

            if (loading) return <div className="p-10 text-center font-bold text-stone-400">Loading NPM...</div>;

            if (!user) {
                return (
                    <div className="p-10 flex flex-col justify-center min-h-screen">
                        <h1 className="text-6xl font-black text-[#1a2e05] italic text-center mb-2">NPM</h1>
                        <p className="text-center font-bold text-stone-400 uppercase tracking-widest mb-10">Field Access</p>
                        <input className="input-field" placeholder="Email" onChange={e => setEmail(e.target.value)} />
                        <input className="input-field" type="password" placeholder="Password" onChange={e => setPass(e.target.value)} />
                        <button onClick={login} className="btn-primary mt-4">LOG IN</button>
                    </div>
                );
            }

            return (
                <div className="p-6">
                    <div className="flex justify-between items-center mb-8">
                        <h1 className="text-3xl font-black text-[#1a2e05]">Dashboard</h1>
                        <button onClick={() => window.NPM_FB.auth.signOut()} className="text-xs font-bold text-red-600">EXIT</button>
                    </div>
                    <div className="bg-[#3e5622] text-white p-8 rounded-[2rem] shadow-lg">
                        <p className="font-bold opacity-70 uppercase text-xs">Logged in as</p>
                        <p className="text-lg font-black">{user.email}</p>
                    </div>
                    <p className="mt-10 text-center text-stone-400 font-bold">Client & Job list loading...</p>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
