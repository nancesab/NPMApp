<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>NPM App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        :root { --forest: #1a2e05; --grass: #3e5622; --dirt: #c5a059; }
        body { background-color: #f8f8f8; font-family: -apple-system, system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
        .sun-card { @apply bg-white rounded-3xl shadow-sm border border-stone-200 p-5 mb-4 active:scale-[0.98] transition-all; }
        .input-label { @apply text-xs font-black uppercase text-stone-500 mb-2 block tracking-wider; }
        .input-field { @apply w-full p-4 rounded-xl border-2 border-stone-200 bg-white text-lg mb-6 focus:border-[#3e5622] outline-none font-medium; }
        .btn-primary { @apply bg-[#1a2e05] text-white font-black py-5 px-6 rounded-2xl shadow-lg active:bg-black w-full text-xl text-center; }
        .modal-overlay { @apply fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] flex items-end justify-center; }
        .modal-content { @apply bg-white w-full max-w-md rounded-t-[3rem] p-8 pb-12 animate-in slide-in-from-bottom duration-300 max-h-[95vh] overflow-y-auto shadow-2xl; }
        nav { @apply fixed bottom-0 left-0 right-0 bg-white border-t border-stone-200 flex justify-around pb-10 pt-3 z-50 shadow-2xl; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, onSnapshot, doc, updateDoc, deleteDoc, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAbPZO0PBMojki9axxrB5b30WqiVh4jgsE",
            authDomain: "npm-app-3dbc7.firebaseapp.com",
            projectId: "npm-app-3dbc7",
            storageBucket: "npm-app-3dbc7.firebasestorage.app",
            messagingSenderId: "714816852874",
            appId: "1:714816852874:web:e569408de4b487fd66ee73"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        setPersistence(auth, browserLocalPersistence);
        window.NPM_FB = { auth, db, addDoc, collection, query, onSnapshot, doc, updateDoc, deleteDoc, signInWithEmailAndPassword, onAuthStateChanged, orderBy };
    </script>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const fb = window.NPM_FB;
        const SERVICES = ["Stump Grinding", "Land Clearing", "Auger Services", "Storm Cleanup", "Debris Hauling", "Free Estimate", "Other"];

        const App = () => {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('dashboard');
            const [customers, setCustomers] = useState([]);
            const [appointments, setAppointments] = useState([]);
            const [isAddingJob, setIsAddingJob] = useState(null);
            const [isAddingCustomer, setIsAddingCustomer] = useState(false);
            const [selectedJob, setSelectedJob] = useState(null);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const unsubAuth = fb.onAuthStateChanged(fb.auth, u => { setUser(u); setLoading(false); });
            }, []);

            useEffect(() => {
                if (user) {
                    const unsubCust = fb.onSnapshot(fb.query(fb.collection(fb.db, "customers"), fb.orderBy("name")), (s) => 
                        setCustomers(s.docs.map(d => ({id: d.id, ...d.data()})))
                    );
                    const unsubAppt = fb.onSnapshot(fb.query(fb.collection(fb.db, "appointments"), fb.orderBy("date")), (s) => 
                        setAppointments(s.docs.map(d => ({id: d.id, ...d.data()})))
                    );
                    return () => { unsubCust(); unsubAppt(); };
                }
            }, [user]);

            const sendSMS = (appt) => {
                const cust = customers.find(c => c.id === appt.customerId);
                const timeStr = new Date(appt.date).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                const msg = `Hi ${appt.customerName}! This is a reminder from Nance Property Maintenance for your ${appt.service} tomorrow. We'll be there around ${timeStr}. Thanks for choosing us!`;
                window.open(`sms:${cust?.phone || ''}?&body=${encodeURIComponent(msg)}`);
                fb.updateDoc(fb.doc(fb.db, "appointments", appt.id), { reminderSent: true });
            };

            const closeAllModals = () => {
                setIsAddingCustomer(false);
                setIsAddingJob(null);
                setSelectedJob(null);
            };

            if (loading) return <div className="p-10 text-center font-bold text-stone-400 mt-20">NPM App Loading...</div>;
            if (!user) return <LoginScreen />;

            return (
                <div className="max-w-md mx-auto min-h-screen pb-24">
                    <header className="p-6 bg-[#1a2e05] text-white flex justify-between items-center rounded-b-[2.5rem] shadow-xl">
                        <div><h1 className="text-2xl font-black italic">NPM App</h1><p className="text-[10px] font-bold opacity-60 uppercase">Nance Property Maintenance</p></div>
                        <button onClick={() => fb.signOut(fb.auth)} className="bg-white/10 px-3 py-1 rounded-full text-[10px] font-black uppercase">Exit</button>
                    </header>

                    <main className="p-4">
                        {view === 'dashboard' && <Dashboard appointments={appointments} onJobClick={setSelectedJob} />}
                        {view === 'customers' && <CustomersList customers={customers} onAddJob={setIsAddingJob} onAddCustomer={() => setIsAddingCustomer(true)} />}
                        {view === 'appointments' && <AppointmentsList appointments={appointments} onJobClick={setSelectedJob} onAddBlankJob={() => setIsAddingCustomer(true)} />}
                        {view === 'reminders' && <RemindersView appointments={appointments} onSend={sendSMS} />}
                    </main>

                    <nav>
                        <NavIcon active={view==='dashboard'} label="Home" icon="🏠" onClick={()=>{closeAllModals(); setView('dashboard');}} />
                        <NavIcon active={view==='appointments'} label="Schedule" icon="📅" onClick={()=>{closeAllModals(); setView('appointments');}} />
                        <NavIcon active={view==='customers'} label="Clients" icon="👥" onClick={()=>{closeAllModals(); setView('customers');}} />
                        <NavIcon active={view==='reminders'} label="Remind" icon="🔔" onClick={()=>{closeAllModals(); setView('reminders');}} />
                    </nav>

                    {isAddingJob && <JobModal customer={isAddingJob} onClose={()=>setIsAddingJob(null)} />}
                    {isAddingCustomer && <CustomerModal onClose={(newC)=>{setIsAddingCustomer(false); if(newC) setIsAddingJob(newC);}} />}
                    {selectedJob && <JobDetailModal job={selectedJob} onClose={()=>setSelectedJob(null)} onSend={sendSMS} />}
                </div>
            );
        };

        const NavIcon = ({ active, label, icon, onClick }) => (
            <button onClick={onClick} className={`flex flex-col items-center w-full transition-all ${active ? 'text-[#3e5622] scale-110 font-black' : 'text-stone-300'}`}>
                <span className="text-xl mb-1">{icon}</span>
                <span className="text-[9px] uppercase tracking-widest">{label}</span>
            </button>
        );

        const Dashboard = ({ appointments, onJobClick }) => {
            const today = new Date().toISOString().split('T')[0];
            const jobsToday = appointments.filter(a => a.date?.includes(today) && a.status !== 'Completed');
            return (
                <div className="animate-in fade-in">
                    <div className="sun-card bg-[#3e5622] text-white border-none shadow-lg text-center py-8">
                        <p className="font-bold opacity-70 uppercase text-xs tracking-widest mb-2">Today's Jobs</p>
                        <h2 className="text-6xl font-black">{jobsToday.length}</h2>
                    </div>
                    <h3 className="font-black text-[#1a2e05] mt-6 mb-4 px-2 uppercase text-sm italic">Daily Docket</h3>
                    {jobsToday.length === 0 ? <p className="text-stone-400 italic text-center py-10">No active jobs right now.</p> :
                        jobsToday.map(j => <JobRow key={j.id} j={j} onClick={() => onJobClick(j)} />)
                    }
                </div>
            );
        };

        const JobRow = ({ j, onClick }) => (
            <div onClick={onClick} className="sun-card border-l-8 border-[#c5a059] flex justify-between items-center active:bg-stone-50">
                <div className="overflow-hidden">
                    <div className="font-black text-lg leading-tight text-[#1a2e05]">{j.service}</div>
                    <div className="text-stone-500 font-bold text-sm">{j.customerName}</div>
                    <div className="text-[10px] text-stone-400 font-black mt-1 uppercase truncate">{j.address || 'No Address'}</div>
                </div>
                <div className="font-black text-[#3e5622] ml-2">${j.price}</div>
            </div>
        );

        const CustomersList = ({ customers, onAddJob, onAddCustomer }) => {
            const [q, setQ] = useState('');
            const deleteCust = async (id) => { if(confirm("Delete Client Profile?")) await fb.deleteDoc(fb.doc(fb.db, "customers", id)); };
            return (
                <div className="animate-in fade-in">
                    <div className="flex gap-2 mb-6">
                        <input className="input-field mb-0 shadow-sm" placeholder="Search Names..." onChange={e=>setQ(e.target.value.toLowerCase())} />
                        <button onClick={onAddCustomer} className="bg-[#c5a059] text-white px-6 rounded-2xl font-black shadow-lg text-2xl">+</button>
                    </div>
                    {customers.filter(c => c.name.toLowerCase().includes(q)).map(c => (
                        <div key={c.id} className="sun-card">
                            <div className="flex justify-between items-start">
                                <div><h4 className="font-black text-xl leading-tight text-[#1a2e05]">{c.name}</h4><p className="text-[#c5a059] font-bold text-sm mb-4">{c.phone}</p></div>
                                <div className="flex gap-1">
                                    <button onClick={()=>onAddJob(c)} className="bg-[#3e5622] text-white text-[9px] font-black px-3 py-2 rounded-lg uppercase">Add Job</button>
                                    <button onClick={()=>deleteCust(c.id)} className="bg-red-50 text-red-400 p-2 rounded-lg">🗑️</button>
                                </div>
                            </div>
                            <div className="flex gap-2">
                                <a href={`tel:${c.phone}`} className="flex-1 bg-stone-100 py-3 rounded-xl text-center">📞 Call</a>
                                <a href={`sms:${c.phone}`} className="flex-1 bg-stone-100 py-3 rounded-xl text-center">💬 Text</a>
                            </div>
                        </div>
                    ))}
                </div>
            );
        };

        const AppointmentsList = ({ appointments, onJobClick, onAddBlankJob }) => (
            <div className="animate-in fade-in">
                <div className="flex justify-between items-center mb-4 px-2">
                    <h3 className="font-black text-[#1a2e05] uppercase text-sm">Full Schedule</h3>
                    <button onClick={onAddBlankJob} className="bg-[#c5a059] text-white px-4 py-2 rounded-xl font-black text-[10px] uppercase shadow-md">New Client & Job +</button>
                </div>
                {appointments.map(a => <JobRow key={a.id} j={a} onClick={() => onJobClick(a)} />)}
            </div>
        );

        const RemindersView = ({ appointments, onSend }) => {
            const pending = appointments.filter(a => !a.reminderSent && a.status !== 'Completed');
            return (
                <div className="animate-in fade-in">
                    <h3 className="font-black text-[#1a2e05] mb-4 px-2 uppercase text-sm italic">Needs Reminder</h3>
                    {pending.length === 0 ? <p className="text-center text-stone-400 mt-10 italic">All caught up!</p> :
                        pending.map(a => (
                            <div key={a.id} className="sun-card border-l-8 border-[#3e5622]">
                                <div className="font-black text-[#1a2e05] text-lg">{a.customerName}</div>
                                <p className="text-xs font-bold text-stone-400 mb-4">{a.service}</p>
                                <button onClick={()=>onSend(a)} className="btn-primary py-4 text-sm uppercase">Send Reminder Text</button>
                            </div>
                        ))
                    }
                </div>
            );
        };

        const JobDetailModal = ({ job, onClose, onSend }) => {
            const markDone = async () => { 
                await fb.updateDoc(fb.doc(fb.db, "appointments", job.id), { status: 'Completed' });
                onClose();
            };
            const deleteJob = async () => { if(confirm("Permanently delete job record?")) { await fb.deleteDoc(fb.doc(fb.db, "appointments", job.id)); onClose(); } };
            
            return (
                <div className="modal-overlay" onClick={onClose}>
                    <div className="modal-content" onClick={e=>e.stopPropagation()}>
                        <div className="w-12 h-1.5 bg-stone-200 rounded-full mx-auto mb-8"></div>
                        <div className="mb-8">
                            <h2 className="text-3xl font-black text-[#1a2e05] leading-none mb-2">{job.service}</h2>
                            <p className="text-xl font-bold text-[#c5a059]">{job.customerName}</p>
                        </div>
                        <div className="space-y-6 mb-10">
                            <div>
                                <label className="input-label">Location</label>
                                <button onClick={() => window.open(`http://maps.apple.com/?q=${encodeURIComponent(job.address)}`)} className="w-full text-left bg-blue-50 p-5 rounded-2xl text-blue-700 font-bold border border-blue-100 flex items-center justify-between">
                                    <span className="truncate mr-2">{job.address || 'Add address in client profile'}</span>
                                    <span>📍</span>
                                </button>
                            </div>
                            <div className="flex gap-4">
                                <div className="flex-1"><label className="input-label">Date</label><div className="font-black text-lg">{new Date(job.date).toLocaleDateString()}</div></div>
                                <div className="flex-1 text-right"><label className="input-label">Estimate</label><div className="font-black text-2xl text-[#3e5622]">${job.price}</div></div>
                            </div>
                        </div>
                        <button onClick={markDone} className="btn-primary py-5 mb-3">✅ MARK AS DONE</button>
                        <button onClick={() => onSend(job)} className="w-full py-4 bg-stone-100 text-[#3e5622] font-black rounded-2xl mb-3 uppercase text-xs">🔔 Send Reminder</button>
                        <button onClick={deleteJob} className="w-full py-2 text-red-300 font-bold text-[10px] uppercase">Delete Record</button>
                    </div>
                </div>
            );
        };

        const JobModal = ({ customer, onClose }) => {
            const [service, setService] = useState(SERVICES[0]);
            const [date, setDate] = useState('');
            const [price, setPrice] = useState('');
            const save = async () => {
                if(!date || !price) return alert("Price and Date required");
                await fb.addDoc(fb.collection(fb.db, "appointments"), {
                    customerId: customer.id, customerName: customer.name, address: customer.address || '',
                    service, date, price, status: 'Scheduled', reminderSent: false
                });
                onClose();
            };
            return (
                <div className="modal-overlay" onClick={onClose}>
                    <div className="modal-content" onClick={e=>e.stopPropagation()}>
                        <div className="w-12 h-1.5 bg-stone-200 rounded-full mx-auto mb-6"></div>
                        <h3 className="text-2xl font-black mb-8 text-[#1a2e05]">Job Details</h3>
                        <p className="font-bold text-[#c5a059] mb-6 uppercase text-xs">For: {customer.name}</p>
                        
                        <label className="input-label">Service Type</label>
                        <select className="input-field" onChange={e=>setService(e.target.value)}>
                            {SERVICES.map(s => <option key={s} value={s}>{s}</option>)}
                        </select>
                        
                        <label className="input-label">Schedule Date & Time</label>
                        <input type="datetime-local" className="input-field" onChange={e=>setDate(e.target.value)} />
                        
                        <label className="input-label">Price / Estimate ($)</label>
                        <input type="number" inputMode="decimal" className="input-field" placeholder="0.00" onChange={e=>setPrice(e.target.value)} />
                        
                        <button onClick={save} className="btn-primary mt-4 shadow-2xl">SCHEDULE JOB</button>
                    </div>
                </div>
            );
        };

        const CustomerModal = ({ onClose }) => {
            const [name, setName] = useState('');
            const [phone, setPhone] = useState('');
            const [address, setAddress] = useState('');
            const save = async () => {
                if(!name || !phone) return alert("Please enter a name and phone.");
                const docRef = await fb.addDoc(fb.collection(fb.db, "customers"), { name, phone, address });
                onClose({id: docRef.id, name, phone, address});
            };
            return (
                <div className="modal-overlay" onClick={() => onClose(null)}>
                    <div className="modal-content" onClick={e=>e.stopPropagation()}>
                        <div className="w-12 h-1.5 bg-stone-200 rounded-full mx-auto mb-6"></div>
                        <h3 className="text-2xl font-black mb-10 text-[#1a2e05]">New Client Entry</h3>
                        
                        <label className="input-label">Full Name</label>
                        <input className="input-field" placeholder="Client Name" onChange={e=>setName(e.target.value)} />
                        
                        <label className="input-label">Phone Number</label>
                        <input type="tel" inputMode="tel" className="input-field" placeholder="863-xxx-xxxx" onChange={e=>setPhone(e.target.value)} />
                        
                        <label className="input-label">Job Address</label>
                        <input className="input-field" placeholder="Street, City, Zip" onChange={e=>setAddress(e.target.value)} />
                        
                        <button onClick={save} className="btn-primary mt-6 shadow-2xl">SAVE & CONTINUE</button>
                    </div>
                </div>
            );
        };

        const LoginScreen = () => {
            const [e, setE] = useState(''); const [p, setP] = useState('');
            return (
                <div className="p-10 flex flex-col justify-center min-h-screen bg-white">
                    <div className="mb-10 text-center">
                        <h1 className="text-7xl font-black text-[#1a2e05] italic">NPM</h1>
                        <p className="font-bold text-stone-300 uppercase tracking-[0.3em] text-[9px] mt-2">Nance Property Maintenance</p>
                    </div>
                    <input className="input-field" placeholder="Email" onChange={x=>setE(x.target.value)} />
                    <input className="input-field" type="password" placeholder="Password" onChange={x=>setP(x.target.value)} />
                    <button onClick={()=>fb.signInWithEmailAndPassword(fb.auth, e, p)} className="btn-primary mt-4">LOG IN</button>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
