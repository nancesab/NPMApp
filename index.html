<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>NPM App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        :root { --forest: #1a2e05; --grass: #3e5622; --dirt: #c5a059; }
        body { background-color: #f8f8f8; font-family: -apple-system, system-ui, sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        
        /* LOGIN FIX: Forces labels and boxes to stay in their lane */
        .login-container { @apply p-6 flex flex-col justify-center min-h-screen bg-white max-w-sm mx-auto; }
        .form-group { @apply mb-8 w-full; }
        .input-label { @apply text-[10px] font-black uppercase text-stone-400 mb-2 tracking-widest block; }
        .input-field { @apply w-full p-4 rounded-xl border-2 border-stone-100 bg-stone-50 text-base focus:border-[#3e5622] outline-none font-bold block transition-all appearance-none; }
        
        .btn-primary { @apply bg-[#1a2e05] text-white font-black py-5 px-6 rounded-2xl shadow-lg active:scale-95 w-full text-lg text-center block mt-4 transition-transform; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top: 1px solid #e5e7eb; display: flex; justify-content: space-around; padding-top: 12px; padding-bottom: calc(20px + env(safe-area-inset-bottom)); z-index: 1000; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, onSnapshot, doc, updateDoc, deleteDoc, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAbPZO0PBMojki9axxrB5b30WqiVh4jgsE",
            authDomain: "npmapp-542dc.firebaseapp.com",
            projectId: "npmapp-542dc",
            storageBucket: "npmapp-542dc.appspot.com",
            messagingSenderId: "714816852874",
            appId: "1:714816852874:web:e569408de4b487fd66ee73"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        setPersistence(auth, browserLocalPersistence);
        window.NPM_FB = { auth, db, addDoc, collection, query, onSnapshot, doc, updateDoc, deleteDoc, signInWithEmailAndPassword, signOut, onAuthStateChanged, orderBy };
    </script>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const fb = window.NPM_FB;

        const App = () => {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const unsub = fb.onAuthStateChanged(fb.auth, (u) => { setUser(u); setLoading(false); });
                return () => unsub();
            }, []);

            if (loading) return <div className="p-10 text-center font-black text-stone-300 mt-20 italic uppercase">NPM LOADING</div>;
            
            return !user ? <LoginScreen onLogin={setUser} /> : (
                <div className="max-w-md mx-auto min-h-screen pb-40">
                    <header className="p-6 pt-12 bg-[#1a2e05] text-white flex justify-between items-center rounded-b-[2rem]">
                        <h1 className="text-xl font-black italic">NPM App</h1>
                        <button onClick={() => fb.signOut(fb.auth)} className="text-[10px] font-bold opacity-50 uppercase">Logout</button>
                    </header>
                    <div className="p-6 text-center mt-20">
                        <h2 className="text-2xl font-black text-stone-800">Welcome Back!</h2>
                        <p className="text-stone-400 mt-2">Login Successful.</p>
                    </div>
                </div>
            );
        };

        const LoginScreen = ({ onLogin }) => {
            const [email, setEmail] = useState('');
            const [pass, setPass] = useState('');
            const [err, setErr] = useState('');

            const handleLogin = async () => {
                setErr('');
                try {
                    const res = await fb.signInWithEmailAndPassword(fb.auth, email.trim(), pass);
                    onLogin(res.user);
                } catch (e) {
                    setErr("Invalid login. Check Firebase Users list.");
                }
            };

            return (
                <div className="login-container">
                    <div className="mb-16 text-center">
                        <h1 className="text-6xl font-black text-[#1a2e05] italic">NPM</h1>
                        <p className="font-bold text-stone-300 uppercase tracking-widest text-[9px] mt-2">Property Maintenance</p>
                    </div>
                    
                    <div className="form-group">
                        <label className="input-label">Email</label>
                        <input className="input-field" type="email" placeholder="user@email.com" onChange={e=>setEmail(e.target.value)} />
                    </div>

                    <div className="form-group">
                        <label className="input-label">Password</label>
                        <input className="input-field" type="password" placeholder="••••••••" onChange={e=>setPass(e.target.value)} />
                    </div>

                    {err && <p className="text-red-500 text-[10px] font-bold mb-4 text-center uppercase tracking-tighter">{err}</p>}

                    <button onClick={handleLogin} className="btn-primary">LOG IN</button>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
