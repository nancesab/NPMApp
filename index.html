<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>NPM App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { background-color: #f8f8f8; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
        .input-field { width: 100%; padding: 1rem; border-radius: 1rem; border: 2px solid #f1f1f1; background: #fafafa; font-size: 1rem; font-weight: 700; outline: none; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top: 1px solid #e5e7eb; display: flex; justify-content: space-around; padding-bottom: env(safe-area-inset-bottom); z-index: 1000; }
        .floating-add { position: fixed; bottom: 100px; left: 20px; right: 20px; z-index: 900; @apply bg-[#c5a059] text-white py-5 rounded-2xl shadow-2xl flex items-center justify-center font-black uppercase; }
        .sun-card { @apply bg-white rounded-3xl shadow-sm border border-stone-200 p-5 mb-4; }
        .btn-primary { @apply bg-[#1a2e05] text-white font-black py-5 rounded-2xl shadow-lg w-full text-xl; }
        .modal-overlay { @apply fixed inset-0 bg-black/60 backdrop-blur-sm z-[2000] flex items-end justify-center; }
        .modal-content { @apply bg-white w-full max-w-md rounded-t-[3rem] p-6 pb-32 max-h-[92vh] overflow-y-auto; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, onSnapshot, doc, updateDoc, deleteDoc, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDKBNh28LkDEz0nyY6cfl6IiOHyzNlBd0U",
            authDomain: "npmapp-542dc.firebaseapp.com",
            projectId: "npmapp-542dc",
            storageBucket: "npmapp-542dc.firebasestorage.app",
            messagingSenderId: "111152583953",
            appId: "1:111152583953:web:7114f316fc0c381e6ae8b0"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        setPersistence(auth, browserLocalPersistence);
        window.NPM_FB = { auth, db, addDoc, collection, query, onSnapshot, doc, updateDoc, deleteDoc, signInWithEmailAndPassword, signOut, onAuthStateChanged, where };
    </script>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const fb = window.NPM_FB;

        const App = () => {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('dashboard');
            const [appointments, setAppointments] = useState([]);
            const [isAddingJob, setIsAddingJob] = useState(false);
            const [selectedJob, setSelectedJob] = useState(null);

            useEffect(() => {
                const unsubAuth = fb.onAuthStateChanged(fb.auth, (u) => setUser(u));
                return () => unsubAuth();
            }, []);

            useEffect(() => {
                if (user) {
                    // Simplified query to avoid index errors
                    const q = fb.query(fb.collection(fb.db, "appointments"), fb.where("status", "==", "Scheduled"));
                    const unsub = fb.onSnapshot(q, (s) => {
                        setAppointments(s.docs.map(d => ({id: d.id, ...d.data()})));
                    }, (error) => {
                        alert("Database Error: " + error.message);
                    });
                    return () => unsub();
                }
            }, [user]);

            if (!user) return <Login onLogin={setUser} />;

            return (
                <div className="max-w-md mx-auto min-h-screen pb-48">
                    <header className="p-6 pt-12 bg-[#1a2e05] text-white rounded-b-[2.5rem] flex justify-between items-center shadow-xl">
                        <div><h1 className="text-2xl font-black italic">NPM App</h1><p className="text-[10px] font-bold opacity-60 uppercase">Nance Property Maintenance</p></div>
                        <button onClick={() => fb.signOut(fb.auth)} className="bg-white/10 px-4 py-2 rounded-full text-[10px] font-black uppercase">Exit</button>
                    </header>

                    <main className="p-4">
                        <div className="flex justify-between items-center mb-6">
                            <h3 className="font-black text-[#1a2e05] uppercase text-xs tracking-widest italic">Active Schedule ({appointments.length})</h3>
                        </div>
                        {appointments.map(j => (
                            <div key={j.id} onClick={() => setSelectedJob(j)} className="sun-card border-l-8 border-[#c5a059] flex justify-between items-center">
                                <div><div className="font-black text-lg text-[#1a2e05]">{j.service}</div><div className="text-stone-500 font-bold text-sm">{j.customerName || 'No Name'}</div></div>
                                <div className="font-black text-[#3e5622]">${j.price || 0}</div>
                            </div>
                        ))}
                    </main>

                    <button onClick={() => setIsAddingJob(true)} className="floating-add">+ NEW JOB</button>

                    {isAddingJob && <AddModal onClose={() => setIsAddingJob(false)} />}
                    {selectedJob && <DetailModal job={selectedJob} onClose={() => setSelectedJob(null)} />}
                </div>
            );
        };

        const Login = ({ onLogin }) => {
            const [email, setEmail] = useState(''); const [pass, setPass] = useState('');
            const handleLogin = async () => {
                try { await fb.signInWithEmailAndPassword(fb.auth, email.trim(), pass); } 
                catch (e) { alert("Login Error: " + e.message); }
            };
            return (
                <div className="flex flex-col h-screen items-center justify-center p-8 bg-white">
                    <h1 className="text-7xl font-black text-[#1a2e05] italic mb-12">NPM</h1>
                    <input className="input-field mb-4" placeholder="Email" onChange={e=>setEmail(e.target.value)} />
                    <input className="input-field mb-8" type="password" placeholder="Password" onChange={e=>setPass(e.target.value)} />
                    <button onClick={handleLogin} className="btn-primary">LOG IN</button>
                </div>
            );
        };

        const AddModal = ({ onClose }) => {
            const [form, setForm] = useState({ service: 'Stump Grinding', customerName: '', address: '', date: '', price: '', description: '' });
            const [loading, setLoading] = useState(false);

            const save = async () => {
                if (!form.date) return alert("Please select a date.");
                setLoading(true);
                try {
                    await fb.addDoc(fb.collection(fb.db, "appointments"), { ...form, status: 'Scheduled' });
                    onClose();
                } catch (e) {
                    alert("SAVE FAILED: " + e.message);
                }
                setLoading(false);
            };

            return (
                <div className="modal-overlay" onClick={onClose}>
                    <div className="modal-content" onClick={e=>e.stopPropagation()}>
                        <h3 className="text-2xl font-black mb-6">New Job</h3>
                        <input className="input-field mb-4" placeholder="Client Name" onChange={e=>setForm({...form, customerName: e.target.value})} />
                        <select className="input-field mb-4" onChange={e=>setForm({...form, service: e.target.value})}>
                            <option>Stump Grinding</option><option>Land Clearing</option><option>Storm Cleanup</option><option>Other</option>
                        </select>
                        <input className="input-field mb-4" placeholder="Address" onChange={e=>setForm({...form, address: e.target.value})} />
                        <input className="input-field mb-4" type="datetime-local" onChange={e=>setForm({...form, date: e.target.value})} />
                        <input className="input-field mb-4" type="number" placeholder="Price ($)" onChange={e=>setForm({...form, price: e.target.value})} />
                        <textarea className="input-field mb-4 h-24" placeholder="Notes" onChange={e=>setForm({...form, description: e.target.value})} />
                        <button onClick={save} disabled={loading} className="btn-primary">{loading ? "SAVING..." : "SAVE JOB"}</button>
                    </div>
                </div>
            );
        };

        const DetailModal = ({ job, onClose }) => {
            const markDone = async () => { await fb.updateDoc(fb.doc(fb.db, "appointments", job.id), { status: 'Completed' }); onClose(); };
            const del = async () => { if(confirm("Delete?")) { await fb.deleteDoc(fb.doc(fb.db, "appointments", job.id)); onClose(); } };
            return (
                <div className="modal-overlay" onClick={onClose}>
                    <div className="modal-content" onClick={e=>e.stopPropagation()}>
                        <h2 className="text-3xl font-black text-[#1a2e05] mb-1">{job.service}</h2>
                        <p className="text-xl font-bold text-[#c5a059] mb-6">{job.customerName || 'No Name'}</p>
                        <div className="bg-stone-50 p-4 rounded-xl mb-6 border">
                            <p className="text-[10px] font-black uppercase text-stone-400 mb-2">Description</p>
                            <p className="text-sm text-stone-600">{job.description || "No notes."}</p>
                        </div>
                        <button onClick={() => window.open(`http://maps.apple.com/?q=${encodeURIComponent(job.address)}`)} className="btn-primary bg-blue-600 mb-4">Open Maps 📍</button>
                        <button onClick={markDone} className="btn-primary mb-4">✅ MARK AS DONE</button>
                        <button onClick={del} className="w-full text-red-400 font-black uppercase text-xs">Delete Record</button>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
