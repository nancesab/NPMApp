<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>NPM App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        :root { --forest: #1a2e05; --grass: #3e5622; --dirt: #c5a059; }
        
        /* Forces the body to be exactly the height of the phone screen */
        html, body { height: 100%; margin: 0; padding: 0; background-color: #ffffff; overflow: hidden; }
        
        /* Perfect centering for the login screen */
        .login-wrapper { 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center;
            padding: 2rem;
            background: white;
        }

        .form-group { width: 100%; max-width: 320px; margin-bottom: 1.5rem; }
        .input-label { @apply text-[10px] font-black uppercase text-stone-400 mb-2 tracking-widest block; }
        .input-field { 
            width: 100%; 
            padding: 1.25rem; 
            border-radius: 1rem; 
            border: 2px solid #f1f1f1; 
            background: #fafafa; 
            font-size: 1rem;
            font-weight: 700;
            outline: none;
            transition: all 0.2s;
        }
        .input-field:focus { border-color: #3e5622; background: white; }

        .btn-primary { 
            background: #1a2e05; 
            color: white; 
            font-weight: 900; 
            padding: 1.25rem; 
            border-radius: 1rem; 
            width: 100%; 
            max-width: 320px;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 1rem;
            box-shadow: 0 10px 20px rgba(26, 46, 5, 0.2);
        }
        .btn-primary:active { transform: scale(0.96); }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, onSnapshot, doc, updateDoc, deleteDoc, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Verified Config from your Screenshot
        const firebaseConfig = {
            apiKey: "AIzaSyAbPZO0PBMojki9axxrB5b30WqiVh4jgsE",
            authDomain: "npmapp-542dc.firebaseapp.com",
            projectId: "npmapp-542dc",
            storageBucket: "npmapp-542dc.appspot.com",
            messagingSenderId: "714816852874",
            appId: "1:714816852874:web:e569408de4b487fd66ee73"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        setPersistence(auth, browserLocalPersistence);
        window.NPM_FB = { auth, db, addDoc, collection, query, onSnapshot, doc, updateDoc, deleteDoc, signInWithEmailAndPassword, signOut, onAuthStateChanged, orderBy };
    </script>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const fb = window.NPM_FB;

        const App = () => {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const unsub = fb.onAuthStateChanged(fb.auth, (u) => { setUser(u); setLoading(false); });
                return () => unsub();
            }, []);

            if (loading) return <div className="flex items-center justify-center h-screen font-black text-stone-300 italic">NPM LOADING...</div>;
            
            return !user ? <LoginScreen onLogin={setUser} /> : <Dashboard user={user} />;
        };

        const LoginScreen = ({ onLogin }) => {
            const [email, setEmail] = useState('');
            const [pass, setPass] = useState('');
            const [error, setError] = useState('');

            const handleLogin = async () => {
                setError('');
                try {
                    // Added .toLowerCase() to email to prevent case-sensitivity errors
                    const res = await fb.signInWithEmailAndPassword(fb.auth, email.trim().toLowerCase(), pass);
                    onLogin(res.user);
                } catch (e) {
                    setError("Invalid Credentials. Check the user exists in Firebase Console.");
                }
            };

            return (
                <div className="login-wrapper">
                    <div className="text-center mb-12">
                        <h1 className="text-7xl font-black text-[#1a2e05] italic leading-none">NPM</h1>
                        <p className="text-[10px] font-black text-stone-300 uppercase tracking-[0.3em] mt-2">Nance Property Maintenance</p>
                    </div>
                    
                    <div className="form-group">
                        <label className="input-label">Email Address</label>
                        <input className="input-field" type="email" placeholder="name@email.com" onChange={e=>setEmail(e.target.value)} />
                    </div>

                    <div className="form-group">
                        <label className="input-label">Password</label>
                        <input className="input-field" type="password" placeholder="••••••••" onChange={e=>setPass(e.target.value)} />
                    </div>

                    {error && <p className="text-red-500 text-[10px] font-black mb-4 text-center uppercase max-w-[280px]">{error}</p>}

                    <button onClick={handleLogin} className="btn-primary">Log In</button>
                </div>
            );
        };

        const Dashboard = ({ user }) => (
            <div className="p-10 text-center h-screen flex flex-col justify-center">
                <h2 className="text-3xl font-black text-[#1a2e05]">Access Granted</h2>
                <p className="text-stone-400 mt-2 font-bold uppercase text-xs tracking-widest">{user.email}</p>
                <button onClick={() => fb.signOut(fb.auth)} className="mt-10 text-red-400 font-black uppercase text-[10px]">Log Out</button>
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
