<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>NPM App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        :root { --forest: #1a2e05; --grass: #3e5622; --dirt: #c5a059; }
        body { background-color: #f8f8f8; font-family: -apple-system, system-ui, sans-serif; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        /* Centered Login */
        .login-wrapper { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 2rem; background: white; }
        .form-group { width: 100%; max-width: 320px; margin-bottom: 1.25rem; @apply flex flex-col; }
        .input-label { @apply text-[10px] font-black uppercase text-stone-400 mb-1.5 tracking-widest block; }
        .input-field { width: 100%; padding: 1rem; border-radius: 1rem; border: 2px solid #f1f1f1; background: #fafafa; font-size: 1rem; font-weight: 700; outline: none; transition: all 0.2s; }
        .input-field:focus { border-color: #3e5622; background: white; }

        /* Navigation & BIG New Job Button */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top: 1px solid #e5e7eb; display: flex; justify-content: space-around; padding-top: 12px; padding-bottom: calc(20px + env(safe-area-inset-bottom)); z-index: 1000; box-shadow: 0 -10px 25px -5px rgba(0, 0, 0, 0.05); }
        .nav-btn { @apply flex flex-col items-center transition-all flex-1; }
        
        .floating-add-bar { 
            position: fixed; 
            bottom: calc(100px + env(safe-area-inset-bottom)); 
            left: 20px; 
            right: 20px; 
            z-index: 900; 
            @apply bg-[#c5a059] text-white py-5 rounded-2xl shadow-2xl flex items-center justify-center gap-3 active:scale-95 transition-transform;
        }

        /* UI Elements */
        .sun-card { @apply bg-white rounded-3xl shadow-sm border border-stone-200 p-5 mb-4 active:scale-[0.98] transition-all; }
        .btn-primary { @apply bg-[#1a2e05] text-white font-black py-5 px-6 rounded-2xl shadow-lg active:bg-black w-full text-xl text-center block mt-4 disabled:opacity-50; }
        .modal-overlay { @apply fixed inset-0 bg-black/60 backdrop-blur-sm z-[2000] flex items-end justify-center; }
        .modal-content { @apply bg-white w-full max-w-md rounded-t-[3rem] p-6 pb-32 animate-in slide-in-from-bottom duration-300 max-h-[92vh] overflow-y-auto shadow-2xl; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, onSnapshot, doc, updateDoc, deleteDoc, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDKBNh28LkDEz0nyY6cfl6IiOHyzNlBd0U",
            authDomain: "npmapp-542dc.firebaseapp.com",
            projectId: "npmapp-542dc",
            storageBucket: "npmapp-542dc.firebasestorage.app",
            messagingSenderId: "111152583953",
            appId: "1:111152583953:web:7114f316fc0c381e6ae8b0"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const storage = getStorage(app);
        setPersistence(auth, browserLocalPersistence);
        window.NPM_FB = { auth, db, storage, addDoc, collection, query, onSnapshot, doc, updateDoc, deleteDoc, signInWithEmailAndPassword, signOut, onAuthStateChanged, orderBy, ref, uploadBytes, getDownloadURL };
    </script>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const fb = window.NPM_FB;
        const SERVICES = ["Stump Grinding", "Land Clearing", "Auger Services", "Storm Cleanup", "Debris Hauling", "Free Estimate", "Other"];

        const App = () => {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('dashboard');
            const [customers, setCustomers] = useState([]);
            const [contractors, setContractors] = useState([]);
            const [appointments, setAppointments] = useState([]);
            const [selectedJob, setSelectedJob] = useState(null);
            const [isAddingJob, setIsAddingJob] = useState(false);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const unsubAuth = fb.onAuthStateChanged(fb.auth, (u) => { setUser(u); setLoading(false); });
                return () => unsubAuth();
            }, []);

            useEffect(() => {
                if (user) {
                    const unsubCust = fb.onSnapshot(fb.query(fb.collection(fb.db, "customers"), fb.orderBy("name")), (s) => 
                        setCustomers(s.docs.map(d => ({id: d.id, ...d.data()})))
                    );
                    const unsubCont = fb.onSnapshot(fb.query(fb.collection(fb.db, "contractors"), fb.orderBy("name")), (s) => 
                        setContractors(s.docs.map(d => ({id: d.id, ...d.data()})))
                    );
                    const unsubAppt = fb.onSnapshot(fb.query(fb.collection(fb.db, "appointments"), fb.orderBy("date")), (s) => 
                        setAppointments(s.docs.map(d => ({id: d.id, ...d.data()})))
                    );
                    return () => { unsubCust(); unsubCont(); unsubAppt(); };
                }
            }, [user]);

            if (loading) return <div className="flex h-screen items-center justify-center font-black text-stone-300 italic">NPM LOADING...</div>;
            if (!user) return <LoginScreen onLogin={setUser} />;

            return (
                <div className="max-w-md mx-auto min-h-screen pb-40">
                    <header className="p-6 pt-12 bg-[#1a2e05] text-white flex justify-between items-center rounded-b-[2.5rem] shadow-xl">
                        <div><h1 className="text-2xl font-black italic">NPM App</h1><p className="text-[10px] font-bold opacity-60 uppercase tracking-widest">Nance Property Maintenance</p></div>
                        <button onClick={() => fb.signOut(fb.auth)} className="bg-white/10 px-4 py-2 rounded-full text-[10px] font-black uppercase">Exit</button>
                    </header>

                    <main className="p-4">
                        {view === 'dashboard' && <Dashboard appointments={appointments} onJobClick={setSelectedJob} />}
                        {view === 'appointments' && <AppointmentsList appointments={appointments} onJobClick={setSelectedJob} />}
                        {view === 'customers' && <CustomersList customers={customers} contractors={contractors} onAddJob={() => setIsAddingJob(true)} />}
                        {view === 'reminders' && <RemindersView appointments={appointments} customers={customers} />}
                    </main>

                    <button onClick={() => setIsAddingJob(true)} className="floating-add-bar">
                        <span className="text-2xl font-bold">+</span>
                        <span className="font-black uppercase tracking-widest">New Job</span>
                    </button>

                    <div className="bottom-nav">
                        <NavIcon active={view==='dashboard'} label="Home" icon="🏠" onClick={()=>setView('dashboard')} />
                        <NavIcon active={view==='appointments'} label="Schedule" icon="📅" onClick={()=>setView('appointments')} />
                        <NavIcon active={view==='customers'} label="People" icon="👥" onClick={()=>setView('customers')} />
                        <NavIcon active={view==='reminders'} label="Remind" icon="🔔" onClick={()=>setView('reminders')} />
                    </div>

                    {isAddingJob && <NewJobModal contractors={contractors} onClose={()=>setIsAddingJob(false)} />}
                    {selectedJob && <JobDetailModal job={selectedJob} onClose={()=>setSelectedJob(null)} customers={customers} />}
                </div>
            );
        };

        const LoginScreen = ({ onLogin }) => {
            const [email, setEmail] = useState(''); const [pass, setPass] = useState(''); const [error, setError] = useState('');
            const handleLogin = async () => {
                setError('');
                try {
                    const res = await fb.signInWithEmailAndPassword(fb.auth, email.trim().toLowerCase(), pass);
                    onLogin(res.user);
                } catch (e) { setError("Login Failed. Check Credentials."); }
            };
            return (
                <div className="login-wrapper">
                    <div className="text-center mb-12"><h1 className="text-7xl font-black text-[#1a2e05] italic">NPM</h1><p className="text-[10px] font-black text-stone-300 uppercase tracking-widest mt-2">Nance Property Maintenance</p></div>
                    <div className="form-group"><label className="input-label">Email Address</label><input className="input-field" type="email" placeholder="name@email.com" onChange={e=>setEmail(e.target.value)} /></div>
                    <div className="form-group"><label className="input-label">Password</label><input className="input-field" type="password" placeholder="••••••••" onChange={e=>setPass(e.target.value)} /></div>
                    {error && <p className="text-red-500 text-[10px] font-black mb-4 uppercase">{error}</p>}
                    <button onClick={handleLogin} className="btn-primary">Log In</button>
                </div>
            );
        };

        const NavIcon = ({ active, label, icon, onClick }) => (
            <button onClick={onClick} className={`nav-btn ${active ? 'text-[#3e5622] font-black' : 'text-stone-300'}`}>
                <span className="text-2xl mb-1">{icon}</span>
                <span className="text-[10px] uppercase font-bold tracking-tighter">{label}</span>
            </button>
        );

        const Dashboard = ({ appointments, onJobClick }) => {
            const todayStr = new Date().toISOString().split('T')[0];
            const today = appointments.filter(a => a.date?.includes(todayStr) && a.status !== 'Completed');
            return (
                <div className="animate-in fade-in">
                    <h3 className="font-black text-[#1a2e05] mt-2 mb-4 px-2 uppercase text-xs italic tracking-widest">Today's Jobs ({today.length})</h3>
                    {today.length === 0 ? <p className="px-2 text-stone-300 italic mb-8">No jobs today.</p> : today.map(j => <JobCard key={j.id} j={j} onClick={()=>onJobClick(j)} />)}
                </div>
            );
        };

        const JobCard = ({ j, onClick }) => (
            <div onClick={onClick} className="sun-card border-l-8 border-[#c5a059] flex justify-between items-center">
                <div className="overflow-hidden"><div className="font-black text-lg text-[#1a2e05] truncate">{j.service}</div><div className="text-stone-500 font-bold text-sm truncate">{j.customerName || 'Unassigned'} | {j.contractorName}</div></div>
                <div className="font-black text-[#3e5622] ml-2 font-mono">${j.price || 0}</div>
            </div>
        );

        const CustomersList = ({ customers, contractors, onAddJob }) => {
            const [tab, setTab] = useState('clients');
            const [name, setName] = useState('');
            const [phone, setPhone] = useState('');

            const addPerson = async () => {
                if(!name) return;
                const collectionName = tab === 'clients' ? "customers" : "contractors";
                await fb.addDoc(fb.collection(fb.db, collectionName), { name, phone });
                setName(''); setPhone('');
            };

            return (
                <div className="animate-in fade-in">
                    <div className="flex bg-stone-100 p-1 rounded-2xl mb-6">
                        <button onClick={()=>setTab('clients')} className={`flex-1 py-3 rounded-xl font-black text-xs uppercase ${tab==='clients' ? 'bg-white shadow-sm text-[#1a2e05]' : 'text-stone-400'}`}>Clients</button>
                        <button onClick={()=>setTab('contractors')} className={`flex-1 py-3 rounded-xl font-black text-xs uppercase ${tab==='contractors' ? 'bg-white shadow-sm text-[#1a2e05]' : 'text-stone-400'}`}>Contractors</button>
                    </div>

                    <div className="sun-card bg-stone-50 border-dashed border-2">
                        <input className="input-field mb-2" placeholder="Full Name" value={name} onChange={e=>setName(e.target.value)} />
                        <input className="input-field mb-2" placeholder="Phone" value={phone} onChange={e=>setPhone(e.target.value)} />
                        <button onClick={addPerson} className="w-full py-3 bg-[#3e5622] text-white font-black rounded-xl text-xs uppercase">Add {tab === 'clients' ? 'Client' : 'Contractor'}</button>
                    </div>

                    {(tab === 'clients' ? customers : contractors).map(p => (
                        <div key={p.id} className="sun-card flex justify-between items-center">
                            <div><h4 className="font-black text-lg text-[#1a2e05]">{p.name}</h4><p className="text-[#c5a059] font-bold text-xs">{p.phone}</p></div>
                            <button onClick={async() => {if(confirm("Delete?")) await fb.deleteDoc(fb.doc(fb.db, tab === 'clients' ? "customers" : "contractors", p.id))}} className="text-red-300">🗑️</button>
                        </div>
                    ))}
                </div>
            );
        };

        const AppointmentsList = ({ appointments, onJobClick }) => (
            <div className="animate-in fade-in">
                <h3 className="font-black text-[#1a2e05] uppercase text-xs tracking-widest mb-6 px-2">Full Schedule</h3>
                {appointments.map(j => <JobCard key={j.id} j={j} onClick={() => onJobClick(j)} />)}
            </div>
        );

        const RemindersView = ({ appointments, customers }) => {
            const pending = appointments.filter(a => !a.reminderSent && a.status !== 'Completed');
            const sendSMS = (appt) => {
                const cust = customers.find(c => c.name === appt.customerName);
                const msg = `Hi ${appt.customerName}! This is a reminder from NPM for your ${appt.service} on ${new Date(appt.date).toLocaleDateString()}.`;
                window.open(`sms:${cust?.phone || ''}?&body=${encodeURIComponent(msg)}`);
                fb.updateDoc(fb.doc(fb.db, "appointments", appt.id), { reminderSent: true });
            };
            return (
                <div className="animate-in fade-in">
                    <h3 className="font-black text-[#1a2e05] mb-6 px-2 uppercase text-xs tracking-widest italic">Pending Reminders</h3>
                    {pending.map(a => (
                        <div key={a.id} className="sun-card border-l-8 border-[#3e5622]">
                            <div className="font-black text-[#1a2e05] text-lg">{a.customerName || 'Unassigned'}</div>
                            <p className="text-xs font-bold text-stone-400 mb-6 uppercase tracking-widest">{a.service}</p>
                            <button onClick={() => sendSMS(a)} className="btn-primary py-4 text-sm uppercase">Send Text</button>
                        </div>
                    ))}
                </div>
            );
        };

        const NewJobModal = ({ contractors, onClose }) => {
            const [contName, setContName] = useState(contractors[0]?.name || '');
            const [service, setService] = useState(SERVICES[0]);
            const [address, setAddress] = useState('');
            const [date, setDate] = useState('');
            const [desc, setDesc] = useState('');
            const [price, setPrice] = useState('');
            const [custName, setCustName] = useState('');
            const [image, setImage] = useState(null);
            const [uploading, setUploading] = useState(false);

            const handleSave = async () => {
                if(!date) return alert("Date and Time are required.");
                setUploading(true);
                let imgUrl = "";
                if(image) {
                    const storageRef = fb.ref(fb.storage, `jobs/${Date.now()}_${image.name}`);
                    const snapshot = await fb.uploadBytes(storageRef, image);
                    imgUrl = await fb.getDownloadURL(snapshot.ref);
                }
                await fb.addDoc(fb.collection(fb.db, "appointments"), {
                    customerName: custName, contractorName: contName, service, address, date, description: desc, price, imageUrl: imgUrl, status: 'Scheduled', reminderSent: false
                });
                onClose();
            };

            return (
                <div className="modal-overlay" onClick={onClose}><div className="modal-content" onClick={e=>e.stopPropagation()}><div className="w-12 h-1.5 bg-stone-200 rounded-full mx-auto mb-6"></div>
                    <h3 className="text-2xl font-black mb-6 text-[#1a2e05]">New Job</h3>
                    <div className="form-group"><label className="input-label">Contractor:</label><select className="input-field" onChange={e=>setContName(e.target.value)}>{contractors.map(c => <option key={c.id} value={c.name}>{c.name}</option>)}</select></div>
                    <div className="form-group"><label className="input-label">Service:</label><select className="input-field" onChange={e=>setService(e.target.value)}>{SERVICES.map(sv => <option key={sv} value={sv}>{sv}</option>)}</select></div>
                    <div className="form-group"><label className="input-label">Job Address:</label><input className="input-field" onChange={e=>setAddress(e.target.value)} /></div>
                    <div className="form-group"><label className="input-label">Date/Time:</label><input type="datetime-local" className="input-field" onChange={e=>setDate(e.target.value)} /></div>
                    <div className="form-group"><label className="input-label">Job Description:</label><textarea className="input-field h-24" onChange={e=>setDesc(e.target.value)} /></div>
                    <div className="form-group"><label className="input-label">Estimate ($):</label><input type="number" className="input-field" onChange={e=>setPrice(e.target.value)} /></div>
                    <div className="form-group"><label className="input-label">Customer Name:</label><input className="input-field" placeholder="Optional" onChange={e=>setCustName(e.target.value)} /></div>
                    <div className="form-group"><label className="input-label">Job Photo:</label><input type="file" accept="image/*" onChange={e=>setImage(e.target.files[0])} className="text-xs" /></div>
                    <button onClick={handleSave} disabled={uploading} className="btn-primary">{uploading ? "UPLOADING..." : "SAVE JOB"}</button>
                </div></div>
            );
        };

        const JobDetailModal = ({ job, onClose, customers }) => {
            const markDone = async () => { await fb.updateDoc(fb.doc(fb.db, "appointments", job.id), {status: 'Completed'}); onClose(); };
            return (
                <div className="modal-overlay" onClick={onClose}><div className="modal-content" onClick={e=>e.stopPropagation()}><div className="w-12 h-1.5 bg-stone-200 rounded-full mx-auto mb-8"></div>
                    <h2 className="text-3xl font-black text-[#1a2e05] mb-2">{job.service}</h2><p className="text-xl font-bold text-[#c5a059] mb-4">{job.customerName || 'Unassigned Client'}</p>
                    <p className="text-xs font-black uppercase text-stone-400 mb-2 tracking-widest">Assignee: {job.contractorName}</p>
                    <p className="text-sm text-stone-600 mb-6 bg-stone-50 p-4 rounded-xl border border-stone-100">{job.description || "No description provided."}</p>
                    
                    {job.imageUrl && <img src={job.imageUrl} className="w-full h-48 object-cover rounded-2xl mb-6 shadow-sm" />}

                    <button onClick={() => window.open(`http://maps.apple.com/?q=${encodeURIComponent(job.address)}`)} className="w-full text-left bg-blue-50 p-5 rounded-2xl text-blue-700 font-bold border border-blue-100 flex items-center justify-between mb-8 shadow-sm">
                        Open Maps 📍
                    </button>
                    <button onClick={markDone} className="btn-primary mb-3">✅ MARK AS DONE</button>
                    <button onClick={async() => {if(confirm("Delete Job?")) {await fb.deleteDoc(fb.doc(fb.db, "appointments", job.id)); onClose();}}} className="w-full py-2 text-red-300 font-bold text-[10px] uppercase">Delete Record</button>
                </div></div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
